[package]
name = "victoriametrics"
version = "1.146.0"
description = "VictoriaMetrics community edition split by official component boundary"
license = "Apache-2.0"
maintainer = "ArtifactX Packages <packages@artifactx.local>"
section = "database"
group = "Applications/Databases"

[upstream]
owner = "@artifactx-rs/packagers"
project = "VictoriaMetrics/VictoriaMetrics"
homepage = "https://victoriametrics.com/"
release_api = "https://api.github.com/repos/VictoriaMetrics/VictoriaMetrics/releases"
official_docs = "https://docs.victoriametrics.com/victoriametrics/quick-start/"
source_kind = "checksummed-archives"
version_source = "recipe pins a baseline; CI may override VERSION=latest via GitHub releases/latest redirect"
variant = "community-components"
asset_patterns = [
  "victoria-metrics-linux-{arch}-v{version}.tar.gz",
  "vmutils-linux-{arch}-v{version}.tar.gz",
  "victoria-metrics-linux-{arch}-v{version}-cluster.tar.gz",
]
checksum_patterns = [
  "victoria-metrics-linux-{arch}-v{version}_checksums.txt",
  "vmutils-linux-{arch}-v{version}_checksums.txt",
  "victoria-metrics-linux-{arch}-v{version}-cluster_checksums.txt",
]

[outputs]
packages = ["victoriametrics", "victoriametrics-vmagent", "victoriametrics-vmalert", "victoriametrics-vmauth", "victoriametrics-vmctl", "victoriametrics-vmbackup", "victoriametrics-vmrestore", "victoriametrics-vmalert-tool", "victoriametrics-vminsert", "victoriametrics-vmselect", "victoriametrics-vmstorage"]
arches = ["amd64", "arm64"]
rpm_arches = ["x86_64", "aarch64"]
distros = ["apt", "dnf"]
dependencies = []
config_paths = []
smoke_tests = [
  "all component binaries are executable and answer a version/help probe",
  "victoriametrics package includes /usr/lib/systemd/system/victoriametrics.service",
]

[refresh]
cadence = "scheduled CI plus workflow_dispatch"
rollback = "client install smoke fails, service unit missing, upstream checksum verification fails, or component manifest cannot be rendered"
