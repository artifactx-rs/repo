name: refresh package feed

on:
  workflow_dispatch:
    inputs:
      recipe:
        description: Recipe to build
        required: true
        default: victoriametrics
      version:
        description: Upstream version without leading v, or latest
        required: true
        default: latest
      arch:
        description: "Space-separated arch list: amd64, arm64, or both"
        required: true
        default: "amd64 arm64"
      install_smoke:
        description: Run Docker apt/dnf install smoke
        required: true
        type: boolean
        default: true
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: read

env:
  RECIPE: ${{ inputs.recipe || 'victoriametrics' }}
  VERSION: ${{ inputs.version || 'latest' }}
  ARCHES: ${{ inputs.arch || 'amd64 arm64' }}

concurrency:
  group: package-feed-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: package-signing
    permissions:
      contents: read
    steps:
      - name: Checkout package feed
        uses: actions/checkout@v4

      - name: Set up QEMU for multi-arch install smoke
        if: ${{ inputs.install_smoke != false }}
        uses: docker/setup-qemu-action@v3

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rpm dpkg-dev ca-certificates curl

      - name: Verify ArtifactX container
        run: |
          docker pull ghcr.io/artifactx-rs/arx:latest
          docker run --rm ghcr.io/artifactx-rs/arx:latest --version

      - name: Build package feed
        env:
          ARX_DOCKER_IMAGE: ghcr.io/artifactx-rs/arx:latest
          ARX_SIGNING_PRIVATE_ASC: ${{ secrets.ARX_SIGNING_PRIVATE_ASC }}
          ARX_SIGNING_PUBLIC_ASC: ${{ secrets.ARX_SIGNING_PUBLIC_ASC }}
        run: helpers/build-recipe.sh "$RECIPE"

      - name: Guard against signing key leakage
        run: helpers/smoke-no-private-key-leak.sh

      - name: Docker install smoke
        if: ${{ inputs.install_smoke != false }}
        run: helpers/smoke-install-docker.sh "$RECIPE"

      - name: Set up Node for Pages E2E
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Pages E2E dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npm run e2e:install

      - name: Pages search E2E
        run: npm run e2e

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: package-dist-${{ env.RECIPE }}
          path: dist/${{ env.RECIPE }}/
          if-no-files-found: error

      - name: Upload static repository
        uses: actions/upload-artifact@v4
        with:
          name: package-public-${{ env.RECIPE }}
          path: public/
          if-no-files-found: error

      - name: Upload provenance
        uses: actions/upload-artifact@v4
        with:
          name: package-provenance-${{ env.RECIPE }}
          path: |
            work/${{ env.RECIPE }}/*/*/provenance.txt
            work/${{ env.RECIPE }}/*/*/archive-*-contents.txt
          if-no-files-found: error

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy-pages:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
